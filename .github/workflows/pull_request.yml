---
name: Pull Request
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # holden:ignore:HLD_CI_017: JamesWoolfenden/.github is our own org-level shared-workflow repo, not a third-party dependency — tracked at @main intentionally
  pr:
    uses: JamesWoolfenden/.github/.github/workflows/terraform-pr.yml@main
